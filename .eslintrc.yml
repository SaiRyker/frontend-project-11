env:
  browser: true
  es2021: true
  node: true

extends:
  - airbnb-base
  - eslint:recommended

parserOptions:
  ecmaVersion: latest
  sourceType: module

settings:
  import/resolver:
    node:
      extensions:
        - .js
        - .jsx
        - .ts
        - .tsx
      paths:
        - node_modules

rules:
  no-console: off
  import/no-unresolved:
    - error
    - ignore:
        - '^on-change$'
  import/extensions:
    - error
    - always
  semi:
    - error
    - never
  'arrow-parens': off
  no-param-reassign:
    - error
    - props: false
  no-unused-vars:
  - error
  - argsIgnorePattern: "^_"
  'brace-style': ['error', 'stroustrup']
  'no-underscore-dangle': 'off'
  'operator-linebreak': 'off'
  'implicit-arrow-linebreak': 'off'
  'function-paren-newline': 'off'